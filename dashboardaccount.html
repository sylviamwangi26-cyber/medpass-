<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>MedPass | Accountant Dashboard</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>
  <div class="sidebar">
    <div style="padding: 20px; text-align: center;">
      <img src="Gemini_Generated_Image_s9l9b3s9l9b3s9l9-removebg-preview.png" alt="Logo" class="logo">
      <h2>Accounts</h2>
    </div>
    <nav>
      <a href="dashboardaccount.html" class="active"><span>💰</span> <span>Billing & Claims</span></a>
      <a href="#"><span>📁</span> <span>Audit Logs</span></a>
      <a href="#"><span>📊</span> <span>Finance Reports</span></a>
      <a href="settings.html"><span>⚙️</span> <span>Settings</span></a>
    </nav>
  </div>
  <div class="main">
    <div class="header">
      <h1>Finance & Claims</h1>
      <div style="display: flex; align-items: center; gap: 20px;">
        <span id="user-unique-id" class="tag" style="background: var(--primary); color: white;">ID: Loading...</span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>
    <div class="card">
      <h3>Insurance & MedPass Claims</h3>
      <div id="pending-claims" style="margin-top: 15px;">
        <p>No claims pending.</p>
      </div>
    </div>
  </div>
  <script src="js/auth.js"></script>
  <script>

    const user = JSON.parse(localStorage.getItem('user'));
    if (!user || localStorage.getItem('role') !== 'accounts') window.location.href = 'login.html';
    document.getElementById('user-unique-id').innerText = "Officer ID: " + user.unique_id;

    async function fetchClaims() {
      const res = await fetch(`/billing/insurance`, {
        headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
      });
      const data = await res.json();
      const list = document.getElementById('pending-claims');
      if (data.length > 0) {
        list.innerHTML = data.map(b => `
                <div style="padding: 20px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s ease;">
                    <div>
                        <span style="font-weight: 700; font-size: 1rem;">${b.description}</span><br>
                        <span class="tag" style="background: var(--success); color: white; font-size: 0.75rem; margin-top: 5px; display: inline-block;">KES ${b.amount}</span><br>
                        <small style="color: var(--text-muted); display: block; margin-top: 5px;">Patient: ${b.patient_name} | Channel: <b style="color: var(--primary);">${b.billing_type}</b></small>
                    </div>
                    <button class="btn-primary" style="font-size: 0.8rem; padding: 8px 16px;" onclick="markBilled(${b.id})">Mark Billed</button>
                </div>
            `).join('');
      }
    }

    async function markBilled(id) {
      const res = await fetch(`/billing/${id}/status`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${localStorage.getItem('token')}`
        },
        body: JSON.stringify({ status: 'Billed' })
      });
      const data = await res.json();
      alert(data.message);
      fetchClaims();
    }

    fetchClaims();
    function logout() { localStorage.clear(); window.location.href = 'login.html'; }
  </script>
</body>

</html>
