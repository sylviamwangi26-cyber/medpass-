<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Hospital Admin | MedPass</title>
  <link rel="stylesheet" href="css/dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      text-align: center;
    }

    .stat-card h3 {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 10px;
    }

    .stat-card p {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--primary);
    }

    .charts-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }

    .chart-container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }
  </style>
  <script>
  </script>
</head>

<body>

  <div class="sidebar">
    <div style="padding: 20px; text-align: center;">
      <img src="Gemini_Generated_Image_s9l9b3s9l9b3s9l9-removebg-preview.png" alt="Logo" class="logo">
      <h2>Hospital Admin</h2>
    </div>
    <nav>
      <a href="dashboardhospital.html" class="active"><span>📈</span> <span>Overview</span></a>
      <a href="#" onclick="showSection('staff')"><span>👨‍⚕️</span> <span>Manage Staff</span></a>
      <a href="dashboardreceptionist.html"><span>📋</span> <span>Reception</span></a>
      <a href="settings.html"><span>⚙️</span> <span>Settings</span></a>
    </nav>
  </div>

  <div class="main">
    <div class="header">
      <h1>Performance Insights</h1>
      <div style="display: flex; align-items: center; gap: 20px;">
        <span id="user-unique-id" class="tag" style="background: var(--primary); color: white;">ID: Loading...</span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <div id="overview-section">
      <div class="stats-grid"
        style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
        <div class="card">
          <h3>Total Revenue</h3>
          <p id="stat-revenue" style="font-size: 1.8rem; font-weight: 800; color: var(--success);">KES 0</p>
        </div>
        <div class="card">
          <h3>Total Patients</h3>
          <p id="stat-patients" style="font-size: 1.8rem; font-weight: 800;">0</p>
        </div>
        <div class="card">
          <h3>Doctors</h3>
          <p id="stat-doctors" style="font-size: 1.8rem; font-weight: 800; color: var(--primary);">0</p>
        </div>
        <div class="card">
          <h3>Nurses</h3>
          <p id="stat-nurses" style="font-size: 1.8rem; font-weight: 800; color: var(--secondary);">0</p>
        </div>
      </div>

      <div class="charts-grid">
        <div class="chart-container">
          <h3>Monthly Revenue Trend</h3>
          <canvas id="revenueChart"></canvas>
        </div>
        <div class="chart-container">
          <h3>Revenue by Type</h3>
          <canvas id="typeChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Staff Management Section -->
    <div id="staff-section" style="display: none;">
      <div class="card" style="margin-bottom: 20px;">
        <h3>Add New Staff Member</h3>
        <form id="addStaffForm" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px;">
          <input type="text" id="staffName" placeholder="Full Name" required
            style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
          <input type="email" id="staffEmail" placeholder="Email Address" required
            style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
          <input type="text" id="staffPhone" placeholder="Phone Number"
            style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
          <select id="staffRole" required style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            <option value="">Select Role</option>
            <option value="doctor">Doctor</option>
            <option value="nurse">Nurse</option>
            <option value="lab">Lab Tech</option>
            <option value="pharmacy">Pharmacist</option>
            <option value="accounts">Accountant</option>
            <option value="receptionist">Receptionist</option>
            <option value="radiologist">Radiologist</option>
          </select>
          <input type="text" id="staffSpec" placeholder="Specialization (Optional)"
            style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
          <button type="submit" class="btn-primary" style="padding: 10px;">Register Staff</button>
        </form>
      </div>

      <div class="card">
        <h3>Current Hospital Staff</h3>
        <table style="width: 100%; border-collapse: collapse; margin-top: 15px;">
          <thead>
            <tr style="text-align: left; border-bottom: 2px solid #eee;">
              <th style="padding: 10px;">Name</th>
              <th style="padding: 10px;">ID</th>
              <th style="padding: 10px;">Role</th>
              <th style="padding: 10px;">Specialization</th>
              <th style="padding: 10px;">Action</th>
            </tr>
          </thead>
          <tbody id="staffListTable">
            <!-- Dynamic Content -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/logout.js"></script>
  <script>

    const user = JSON.parse(localStorage.getItem('user'));
    if (!user || user.role !== 'hospital') window.location.href = 'login.html';

    document.getElementById('user-unique-id').innerText = user.full_name + " (" + user.unique_id + ")";

    async function loadStats() {
      const token = localStorage.getItem('token');
      // Existing stats loading logic
      try {
        const res = await fetch(`/stats/hospital/${user.hospital_id}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        document.getElementById('stat-revenue').innerText = "KES " + (data.totalRevenue || 0).toLocaleString();
        document.getElementById('stat-patients').innerText = data.patientCount || 0;
        document.getElementById('stat-doctors').innerText = data.staffTelemetry?.num_doctors || 0;
        document.getElementById('stat-nurses').innerText = data.staffTelemetry?.num_nurses || 0;

        const revCtx = document.getElementById('revenueChart').getContext('2d');
        new Chart(revCtx, {
          type: 'line',
          data: {
            labels: data.monthlyRevenue.map(m => m.month),
            datasets: [{
              label: 'Revenue (KES)',
              data: data.monthlyRevenue.map(m => m.total),
              borderColor: '#6a0dad', tension: 0.1, fill: true, backgroundColor: 'rgba(106, 13, 173, 0.1)'
            }]
          }
        });

        const typeCtx = document.getElementById('typeChart').getContext('2d');
        new Chart(typeCtx, {
          type: 'doughnut',
          data: {
            labels: data.revenueByType.map(r => r.billing_type),
            datasets: [{
              data: data.revenueByType.map(r => r.total),
              backgroundColor: ['#6a0dad', '#00d1b2', '#ffdd57', '#ff3860']
            }]
          }
        });
      } catch (e) { console.error("Stats Error:", e); }
    }

    function showSection(section) {
      document.getElementById('overview-section').style.display = section === 'overview' ? 'block' : 'none';
      document.getElementById('staff-section').style.display = section === 'staff' ? 'block' : 'none';
      if (section === 'staff') fetchStaff();
    }

    async function fetchStaff() {
      const token = localStorage.getItem('token');
      try {
        const res = await fetch(`/staff/hospital/${user.hospital_id}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const staff = await res.json();
        const table = document.getElementById('staffListTable');
        table.innerHTML = staff.map(s => `
          <tr style="border-bottom: 1px solid #eee;">
            <td style="padding: 10px;">${s.full_name}</td>
            <td style="padding: 10px;"><small class="tag">${s.unique_id}</small></td>
            <td style="padding: 10px; text-transform: capitalize;">${s.role}</td>
            <td style="padding: 10px;">${s.specialization || 'N/A'}</td>
            <td style="padding: 10px;">
              <button onclick="removeStaff(${s.id})" style="background: #ff3860; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">Remove</button>
            </td>
          </tr>
        `).join('') || '<tr><td colspan="5" style="text-align: center; padding: 20px;">No staff found</td></tr>';
      } catch (e) { console.error(e); }
    }

    document.getElementById('addStaffForm').onsubmit = async (e) => {
      e.preventDefault();
      const payload = {
        full_name: document.getElementById('staffName').value,
        email: document.getElementById('staffEmail').value,
        phone: document.getElementById('staffPhone').value,
        role: document.getElementById('staffRole').value,
        specialization: document.getElementById('staffSpec').value,
        hospital_id: user.hospital_id
      };
      const token = localStorage.getItem('token');
      const res = await fetch(`${getBaseUrl()}/staff/add`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(payload)
      });
      if (res.ok) {
        alert("Staff member registered successfully!");
        e.target.reset();
        fetchStaff();
      } else {
        const data = await res.json();
        alert("Error: " + data.error);
      }
    };

    async function removeStaff(id) {
      if (!confirm("Are you sure you want to remove this staff member?")) return;
      const token = localStorage.getItem('token');
      const res = await fetch(`${getBaseUrl()}/staff/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) {
        alert("Staff removed");
        fetchStaff();
      }
    }

    loadStats();
  </script>

</body>

</html>
