<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedPass | Settings</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        .settings-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 10px;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 600;
            color: #666;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        .settings-form {
            display: none;
        }

        .settings-form.active {
            display: block;
        }

        .form-row {
            margin-bottom: 15px;
        }

        .form-row label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .form-row input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        @media (max-width: 600px) {
            .tabs {
                flex-direction: column;
                gap: 5px;
            }
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div style="padding: 20px; text-align: center;">
            <img src="Gemini_Generated_Image_s9l9b3s9l9b3s9l9-removebg-preview.png" alt="Logo" class="logo">
            <h2>Preferences</h2>
        </div>
        <nav id="sidebar-nav">
            <!-- Dynamic links based on role -->
            <a href="dashboard.html" id="dash-link"><span>🏠</span> <span>Dashboard</span></a>
            <a href="#" class="active"><span>⚙️</span> <span>Settings</span></a>
            <a href="#" onclick="logout()"><span>🚪</span> <span>Logout</span></a>
        </nav>
    </div>
    <div class="main">
        <div class="header">
            <h1>System Settings</h1>
            <div style="display: flex; align-items: center; gap: 20px;">
                <span id="user-display" class="tag" style="background: var(--primary); color: white;">User Name</span>
            </div>
        </div>

        <div class="settings-container">
            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('profile')">Profile</button>
                <button class="tab-btn" onclick="showTab('security')">Security</button>
                <button class="tab-btn" onclick="showTab('help')">Help Center</button>
            </div>

            <!-- Profile Settings -->
            <div id="profile" class="settings-form active">
                <div class="card">
                    <h3>Personal Information</h3>
                    <form id="profileForm">
                        <div class="form-row">
                            <label>Full Name</label>
                            <input type="text" id="fullName" required>
                        </div>
                        <div class="form-row">
                            <label>Email Address</label>
                            <input type="email" id="email" required>
                        </div>
                        <div id="patient-only-fields" style="display:none;">
                            <div class="form-row">
                                <label>Emergency Contact (Name & Phone)</label>
                                <input type="text" id="emergencyContact">
                            </div>
                            <div class="form-row">
                                <label>Location</label>
                                <input type="text" id="location">
                            </div>
                        </div>
                        <button type="submit" class="btn-primary">Save Changes</button>
                    </form>
                </div>
            </div>

            <!-- Security Settings -->
            <div id="security" class="settings-form">
                <div class="card">
                    <h3>Change Password</h3>
                    <form id="passwordForm">
                        <div class="form-row">
                            <label>Current Password</label>
                            <input type="password" id="currentPass" required>
                        </div>
                        <div class="form-row">
                            <label>New Password</label>
                            <input type="password" id="newPass" required>
                        </div>
                        <div class="form-row">
                            <label>Confirm New Password</label>
                            <input type="password" id="confirmPass" required>
                        </div>
                        <button type="submit" class="btn-primary">Update Password</button>
                    </form>
                </div>
            </div>

            <!-- Help Center -->
            <div id="help" class="settings-form">
                <div class="card">
                    <h3>MedPass Help Center</h3>
                    <p>Need assistance? Contact our support team or browse FAQs.</p>
                    <div style="margin-top: 20px;">
                        <p><strong>Support Email:</strong> support@medpass.com</p>
                        <p><strong>Helpline:</strong> +254 700 000 000</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        const role = localStorage.getItem('role');
        if (!user) window.location.href = 'login.html';

        // Update dashboard link based on role
        const dashLink = document.getElementById('dash-link');
        if (role === 'doctor' || role === 'nurse') dashLink.href = 'medicalpractioner.html';
        else if (role === 'hospital') dashLink.href = 'dashboardhospital.html';
        else if (role === 'receptionist') dashLink.href = 'dashboardreceptionist.html';
        else if (role === 'lab') dashLink.href = 'dashboardlab.html';
        else if (role === 'pharmacy') dashLink.href = 'dashboardpharmacy.html';
        else if (role === 'accounts') dashLink.href = 'dashboardaccount.html';
        else if (role === 'medpassadmin' || role === 'admin') dashLink.href = 'dashboardadmin.html';
        else dashLink.href = 'patient.html';

        document.getElementById('user-display').innerText = user.full_name || user.name;
        document.getElementById('fullName').value = user.full_name || user.name;
        document.getElementById('email').value = user.email || '';

        if (user.role === 'patient') {
            document.getElementById('patient-only-fields').style.display = 'block';
        }

        function showTab(tabId) {
            document.querySelectorAll('.settings-form').forEach(f => f.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                userId: user.id,
                full_name: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                emergency_contact: document.getElementById('emergencyContact')?.value || '',
                location: document.getElementById('location')?.value || ''
            };

            const res = await fetch(`/auth/update-profile`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert("Profile updated!");
                user.full_name = payload.full_name;
                user.email = payload.email;
                localStorage.setItem('user', JSON.stringify(user));
                location.reload();
            } else {
                alert("Update failed");
            }
        });

        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const oldPassword = document.getElementById('currentPass').value;
            const newPassword = document.getElementById('newPass').value;
            const confirm = document.getElementById('confirmPass').value;

            if (newPassword !== confirm) return alert("Passwords do not match");

            const res = await fetch(`/auth/update-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: user.id, oldPassword, newPassword })
            });

            const data = await res.json();
            alert(data.message || data.error);
            if (res.ok) e.target.reset();
        });

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }
    </script>
</body>

</html>
