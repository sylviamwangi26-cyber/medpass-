<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        // Safety Shield: Ensure user is on the correct port (5000)
        if (window.location.port !== '5000' && (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost')) {
            window.location.href = 'http://localhost:5000' + window.location.pathname;
        }
    </script>
    <title>MedPass | Login</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-body);
        }

        .login-container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-container h2 {
            margin-bottom: 30px;
            color: var(--primary);
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.9);
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
        }
    </style>
</head>

<body>
    <div class="login-page">
        <div class="login-container">
            <h2>MedPass Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email or Unique ID</label>
                    <input type="text" id="identifier" placeholder="email@example.com or MP-..." required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Login</button>
            </form>
            <p style="text-align: center; margin-top: 20px;">
                Don't have an account? <a href="register.html">Register</a>
            </p>
        </div>
    </div>
    <div id="successOverlay"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; color: white;">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJmZzIxeGZ4eGZ4ZngmZXA9djFfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PWc/l41lI4bYyX5RjR6S0/giphy.gif"
            alt="Clapping Dancing Cartoon" style="width: 300px; border-radius: 20px; margin-bottom: 20px;">
        <h2 style="font-size: 2.5rem; animation: bounce 1s infinite;">Welcome Back! ✨</h2>
        <p>Login Successful. Clapping for you!</p>
    </div>

    <style>
        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }
    </style>

    <script src="js/auth.js"></script>
    <script>
        function showSuccessAnimation() {
            const overlay = document.getElementById('successOverlay');
            overlay.style.display = 'flex';
        }
    </script>
</body>

</html>
