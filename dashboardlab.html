<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>MedPass | Lab Dashboard</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>
  <div class="sidebar">
    <div style="padding: 20px; text-align: center;">
      <img src="Gemini_Generated_Image_s9l9b3s9l9b3s9l9-removebg-preview.png" alt="Logo" class="logo">
      <h2>Laboratory</h2>
    </div>
    <nav>
      <a href="dashboardlab.html" class="active"><span>🧪</span> <span>Investigations</span></a>
      <a href="imaging.html"><span>📸</span> <span>Radiology</span></a>
      <a href="#"><span>📊</span> <span>Reports</span></a>
      <a href="settings.html"><span>⚙️</span> <span>Settings</span></a>
    </nav>
  </div>
  <div class="main">
    <div class="header">
      <h1>Diagnostic Portal</h1>
      <div style="display: flex; align-items: center; gap: 20px;">
        <span id="user-unique-id" class="tag" style="background: var(--primary); color: white;">ID: Loading...</span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>
    <div class="card">
      <h3>Pending Investigations</h3>
      <div id="pending-tests" style="margin-top: 15px;">
        <p>No tests pending.</p>
      </div>
    </div>
  </div>
  <script src="js/auth.js"></script>
  <script>

    const user = JSON.parse(localStorage.getItem('user'));
    if (!user || localStorage.getItem('role') !== 'lab') window.location.href = 'login.html';
    document.getElementById('user-unique-id').innerText = "Officer ID: " + user.unique_id;

    async function fetchPendingTests() {
      const res = await fetch(`/labs/pending`, {
        headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
      });
      const data = await res.json();
      const list = document.getElementById('pending-tests');
      if (data.length > 0) {
        list.innerHTML = data.map(t => `
                <div style="padding: 20px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s ease;">
                    <div>
                        <span style="font-weight: 700; font-size: 1rem;">${t.test_name}</span><br>
                        <small class="tag" style="font-size: 0.7rem; margin-top: 5px; display: inline-block;">Patient: ${t.patient_name}</small><br>
                        <small style="color: var(--text-muted); font-size: 0.75rem;">Requested: ${new Date(t.created_at).toLocaleString()}</small>
                    </div>
                    <button class="btn-primary" style="font-size: 0.8rem; padding: 8px 16px;" onclick="submitResults(${t.id})">Post Results</button>
                </div>
            `).join('');
      }
    }

    async function submitResults(testId) {
      const results = prompt("Enter test results/findings:");
      if (!results) return;
      const res = await fetch(`/labs/${testId}/result`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${localStorage.getItem('token')}`
        },
        body: JSON.stringify({ results, lab_tech_id: user.id })
      });
      const data = await res.json();
      alert(data.message);
      fetchPendingTests();
    }

    fetchPendingTests();
    function logout() { localStorage.clear(); window.location.href = 'login.html'; }
  </script>
</body>

</html>
